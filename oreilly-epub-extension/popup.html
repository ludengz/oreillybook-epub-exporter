<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">O</div>
    <span class="title">O'Reilly → EPUB</span>
  </div>

  <div id="state-not-oreilly" class="state" style="display:none;">
    <div class="notice">
      <div class="notice-icon">📖</div>
      <div class="notice-text">Navigate to an O'Reilly book page to get started</div>
    </div>
  </div>

  <div id="state-ready" class="state" style="display:none;">
    <div class="book-info">
      <div id="book-title" class="book-title"></div>
      <div id="book-authors" class="book-authors"></div>
    </div>
    <button id="btn-download" class="btn-primary">📥 Download EPUB</button>
  </div>

  <div id="state-downloading" class="state" style="display:none;">
    <div class="book-info">
      <div class="book-title-small">Downloading...</div>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-text" class="progress-text"></div>
    </div>
    <button id="btn-cancel" class="btn-secondary">Cancel</button>
  </div>

  <div id="state-downloading-other" class="state" style="display:none;">
    <div class="book-info">
      <div id="book-title-other" class="book-title"></div>
      <div id="book-authors-other" class="book-authors"></div>
    </div>
    <div class="notice">
      <div class="notice-text">Another book is currently downloading:</div>
      <div id="downloading-other-title" class="book-title-small"></div>
    </div>
    <button class="btn-primary" disabled>📥 Download EPUB</button>
  </div>

  <div id="state-report" class="state" style="display:none;">
    <div id="report-header" class="report-header">
      <span id="report-icon"></span>
      <span id="report-headline"></span>
    </div>
    <div id="report-book-title" class="book-title-small"></div>
    <div id="report-body" class="report-body"></div>
    <button id="btn-redownload" class="btn-primary">📥 Re-download book</button>
    <div id="redownload-note" class="progress-text" style="display:none;"></div>
  </div>

  <div id="state-error" class="state" style="display:none;">
    <div class="notice error">
      <div class="notice-text" id="error-text"></div>
    </div>
    <div id="error-report-counts" class="progress-text" style="display:none;"></div>
    <details id="error-details" style="display:none;">
      <summary>Details</summary>
      <pre id="error-details-text"></pre>
    </details>
    <button id="btn-copy-error" class="btn-primary" style="display:none;">Copy error details</button>
    <button id="btn-retry" class="btn-primary">Retry</button>
    <div id="retry-note" class="progress-text" style="display:none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
